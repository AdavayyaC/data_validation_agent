# ================================================================
# Regulatory Validation Rules — Financial / Banking Domain
# Basel III | AML Directive | Internal Compliance Policies
# Edit thresholds here WITHOUT touching any Python code
# ================================================================

schema:
  required_fields:
    - transaction_id
    - account_id
    - transaction_amount
    - transaction_date
    - currency
    - transaction_type
    - status
    - branch_code
    - capital_ratio
    - approval_code
    - customer_risk_rating
    - counterparty_id

  field_types:
    transaction_id: str
    account_id: str
    transaction_amount: float
    transaction_date: str
    currency: str
    transaction_type: str
    status: str
    branch_code: str
    capital_ratio: float
    approval_code: str
    customer_risk_rating: str
    counterparty_id: str

thresholds:
  capital_ratio:
    min: 0.08
    max: 1.0
    severity: CRITICAL
    regulation: "Basel III — CRR Article 92"
    description: "Minimum capital adequacy ratio requirement"

  transaction_amount:
    min: 0.01
    max: 10000.0
    severity: CRITICAL
    regulation: "AML Directive 2015/849 — Article 11"
    description: "AML transaction monitoring threshold"

  risk_score:
    min: 0.0
    max: 100.0
    severity: WARNING
    regulation: "Internal Risk Policy v3.2"
    description: "Customer risk score out of valid range"

patterns:
  currency:
    regex: "^[A-Z]{3}$"
    severity: WARNING
    regulation: "ISO 4217 Currency Standard"

  account_id:
    regex: "^ACC-[0-9]{6}$"
    severity: WARNING
    regulation: "Internal Account Format Policy v1.0"

  branch_code:
    regex: "^BR-[0-9]{3}$"
    severity: WARNING
    regulation: "Internal Branch Format Policy v1.0"

  transaction_id:
    regex: "^TXN-[0-9]{3,}$"
    severity: WARNING
    regulation: "Transaction ID Format Standard"

cross_field:
  - rule: "approved_needs_code"
    description: "APPROVED transactions must carry a valid approval code"
    condition_field: "status"
    condition_value: "APPROVED"
    required_field: "approval_code"
    severity: CRITICAL
    regulation: "Internal Approval Policy v2.1"

  - rule: "valid_transaction_type"
    description: "Transaction type must be one of the defined classifications"
    field: "transaction_type"
    allowed_values: ["DEBIT", "CREDIT", "TRANSFER"]
    severity: WARNING
    regulation: "Transaction Classification Standard v1.0"

  - rule: "valid_status"
    description: "Status must follow the defined lifecycle values"
    field: "status"
    allowed_values: ["APPROVED", "PENDING", "REJECTED"]
    severity: WARNING
    regulation: "Status Lifecycle Standard v1.0"

  - rule: "valid_risk_rating"
    description: "Customer risk rating must be LOW, MEDIUM, or HIGH"
    field: "customer_risk_rating"
    allowed_values: ["LOW", "MEDIUM", "HIGH"]
    severity: WARNING
    regulation: "Customer Risk Classification Policy"

integrity:
  expected_min_records: 1
  duplicate_check_field: "transaction_id"
  date_field: "transaction_date"
  date_format: "%Y-%m-%d"

anomaly_detection:
  contamination: 0.1
  features:
    - transaction_amount
    - capital_ratio
    - risk_score
  zscore_threshold: 2.5

escalation:
  rules:
    - condition: "critical_count >= 3"
      level: "ESCALATED"
      notify: "Chief Compliance Officer"
      action: "Halt regulatory submission — immediate review required"
    - condition: "critical_count >= 1"
      level: "CRITICAL"
      notify: "Compliance Manager"
      action: "Review and remediate before submission"
    - condition: "warning_count >= 5"
      level: "WARNING"
      notify: "Data Quality Team"
      action: "Investigate and document findings"
    - condition: "all_pass"
      level: "CLEAR"
      notify: "None"
      action: "Proceed with regulatory submission"